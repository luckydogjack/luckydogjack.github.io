# ---------------- #
#   Main Configs   #
# ---------------- #
baseurl:
url: http://luckydogjack.github.io
date_format: "ordinal"
title: lkJack
subtitle: "TO be a lucky Jack"
description: "lkJack的个人博客"
keywords: lkJack, luckydogJack, Jack, blog
timezone: Asia/Shanghai
encoding: "utf-8"
side_bar_repo_limit: 5

# ---------------- #
#      Author      #
# ---------------- #
author: luckydogJack
organization: zkh360.com
organization_url: http://www.zkh360.com
github_username: mzlogin
location: Guangzhou, China
email: lxj1435359352@gmail.com

# ---------------- #
#    Navigation    #
# ---------------- #
navs:
  -
    href: /
    label: 首页

  -
    href: /categories/
    label: 分类

  -
    href: /wiki/
    label: 维基

  -
    href: /links/
    label: 链接

  -
    href: /about/
    label: 关于

# ---------------- #
#       RSS        #
# ---------------- #
subscribe_rss: /feed.xml

# ---------------- #
#      Jekyll      #
# ---------------- #
markdown: kramdown
kramdown:
    input: GFM
highlighter: rouge
paginate: 8
lsi: false
quiet: false
excerpt_separator: "\n\n"
permalink: /:year/:month/:day/:title/
plugins:
    - jekyll-github-metadata
    - rouge
#     - jekyll-html-pipeline
    - jekyll-paginate
    - jekyll-sitemap
    - jekyll-feed
    - jemoji
#     - jekyll-mentions

collections:
    wiki:
        output: true
        permalink: /wiki/:path/

repository: luckydogjack/luckydogjack.github.io

